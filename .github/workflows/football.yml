name: Football Analyzer Auto Run

on:
  workflow_dispatch:
  schedule:
    - cron: '10 3 * * *'    # 北京时间 11:10 发赛程
    - cron: '0 11 * * *'    # 北京时间 19:00 发预测
    - cron: '0 15 * * *'    # 北京时间 23:00 发复盘

jobs:
  run-football:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Run schedule (11:10)
        if: github.event.schedule == '10 3 * * *'
        run: python football_analyzer.py schedule

      - name: Run predict (19:00)
        if: github.event.schedule == '0 11 * * *'
        run: python football_analyzer.py predict

      - name: Run review (23:00)
        if: github.event.schedule == '0 15 * * *'
        run: python football_analyzer.py review
