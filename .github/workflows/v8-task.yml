name: Football Real Data Auto

on:
  schedule:
    - cron: '10 3 * * *'
    - cron: '*/10 * * * *'
    - cron: '0 15 * * *'
    - cron: '10 15 * * *'
  workflow_dispatch: {}

jobs:
  run-football:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取仓库代码
        uses: actions/checkout@v4

      - name: 设置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: 安装依赖
        run: pip install requests

      - name: 抓取今日赛程与初盘
        run: python football_analyzer.py schedule
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
          SENDER_EMAIL: ${{ secrets.SENDER_EMAIL }}
          RECEIVER_EMAIL: ${{ secrets.RECEIVER_EMAIL }}
          EMAIL_AUTH_CODE: ${{ secrets.EMAIL_AUTH_CODE }}

      - name: 抓取赛前45分钟临盘数据
        run: python football_analyzer.py live
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
          SENDER_EMAIL: ${{ secrets.SENDER_EMAIL }}
          RECEIVER_EMAIL: ${{ secrets.RECEIVER_EMAIL }}
          EMAIL_AUTH_CODE: ${{ secrets.EMAIL_AUTH_CODE }}

      - name: 抓取已结束比赛的真实赛果
        run: python football_analyzer.py result
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
          SENDER_EMAIL: ${{ secrets.SENDER_EMAIL }}
          RECEIVER_EMAIL: ${{ secrets.RECEIVER_EMAIL }}
          EMAIL_AUTH_CODE: ${{ secrets.EMAIL_AUTH_CODE }}

      - name: 生成复盘报告并发送邮件
        run: python football_analyzer.py review
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
          SENDER_EMAIL: ${{ secrets.SENDER_EMAIL }}
          RECEIVER_EMAIL: ${{ secrets.RECEIVER_EMAIL }}
          EMAIL_AUTH_CODE: ${{ secrets.EMAIL_AUTH_CODE }}
