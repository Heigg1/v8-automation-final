name: Football Real Data Auto

on:
  schedule:
    - cron: '10 3 * * *'    # 北京时间 11:10 抓取赛程+初盘
    - cron: '*/10 * * * *'  # 每10分钟检查并抓取临盘
    - cron: '0 15 * * *'    # 北京时间 23:00 抓取赛果
    - cron: '10 15 * * *'   # 北京时间 23:10 生成复盘
  workflow_dispatch: {}

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install dependencies
        run: pip install requests
      - name: 抓取今日赛程
        if: github.event.schedule == '10 3 * * *'
        run: python football_analyzer.py schedule
      - name: 抓取临盘赔率
        run: python football_analyzer.py live
      - name: 抓取赛果
        if: github.event.schedule == '0 15 * * *'
        run: python football_analyzer.py result
      - name: 生成复盘报告
        if: github.event.schedule == '10 15 * * *'
        run: python football_analyzer.py review
