name: V8-Auto-Task
on:
  workflow_dispatch:
  schedule:
    - cron: '0 11 * * *'

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install dependencies
        run: pip install requests
      - name: Run script
        run: python main.py
